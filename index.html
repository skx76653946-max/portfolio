<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>四人 - 3D Artist</title>
  <style>:root{--bg-primary:#1a1d23;--bg-secondary:#21252d;--bg-card:#262b33;--accent:#c9d1d9;--text-primary:#e6edf3;--text-secondary:#8b949e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,system-ui,sans-serif;background-color:var(--bg-primary);color:var(--text-primary);line-height:1.6}header{text-align:center;padding:4rem 1rem;background:linear-gradient(180deg,#2a2d33 0%,var(--bg-primary) 100%)}header h1{font-size:4rem;font-weight:700;color:#fff}.tagline{color:#e8e0d0;font-size:1rem;letter-spacing:.35em;text-transform:uppercase}main{max-width:1200px;margin:0 auto;padding:2rem 1rem}.section{margin-bottom:4rem}.section h2{font-size:.85rem;font-weight:500;margin-bottom:1.5rem;color:#8b8b8b;text-transform:uppercase;letter-spacing:.25em}.gallery{display:flex;flex-wrap:wrap;justify-content:center;gap:1.5rem}.card{flex:0 1 340px;background-color:var(--bg-card);border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden;aspect-ratio:4/3;position:relative}.card-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#333}.card-inner span{color:#888;font-size:.85rem}.caption{position:absolute;bottom:0;left:0;right:0;padding:.75rem;background:linear-gradient(transparent,rgba(0,0,0,.8));font-size:.9rem;color:var(--text-secondary)}@media(max-width:600px){.gallery{flex-wrap:nowrap;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;justify-content:flex-start;gap:0;padding-bottom:1rem}.gallery::-webkit-scrollbar{display:none}.gallery .card{flex:0 0 85vw;max-width:85vw;scroll-snap-align:center}header h1{font-size:2.5rem}}</style>
</head>
<body>
  <header>
    <h1>四人</h1>
    <p class="tagline">3D Artist</p>
  </header>
  <main>
    <section class="section"><h2>Works</h2><div class="gallery"><div class="card"><div class="card-inner"><span>Whale</span></div><p class="caption">Whale</p></div><div class="card"><div class="card-inner"><span>Gun</span></div><p class="caption">Gun</p></div><div class="card"><div class="card-inner"><span>Lantern</span></div><p class="caption">Lantern</p></div></div></section>
  </main>
</body>
</html>
