  <script>
document.addEventListener("DOMContentLoaded", function() {var modal = document.getElementById("modelModal");var modalViewer = document.getElementById("modalViewer");var modalCaption = document.getElementById("modalCaption");var modalLoader = document.getElementById("modalLoader");var closeBtn = document.querySelector(".modal-close");function setupViewer(viewer, loader) {if (!viewer || !loader) return;var pctEl = loader.querySelector(".loader-text");var hintEl = loader.querySelector(".loader-hint");var counter = 0;var started = false;var timer = null;function startCounter() {if (started) return;started = true;timer = setInterval(function() {counter++;if (counter >= 90) {clearInterval(timer);if (hintEl) hintEl.textContent = "Loading slowly...";} else {if (pctEl) pctEl.textContent = counter + "%";}}, 100);setTimeout(function() {if (counter < 100) {clearInterval(timer);if (hintEl) hintEl.textContent = "Loading slowly...";}}, 15000);}viewer.addEventListener("load", function() {clearInterval(timer);counter = 100;if (pctEl) pctEl.textContent = "100%";setTimeout(function() { loader.classList.add("hidden"); }, 300);});viewer.addEventListener("error", function() {clearInterval(timer);if (pctEl) pctEl.textContent = "Load failed";setTimeout(function() { loader.classList.add("hidden"); }, 2000);});viewer.addEventListener("model-visibility", function(e) {if (e.detail.visible && !started) startCounter();});if (viewer.src && viewer.complete) {loader.classList.add("hidden");} else {startCounter();loader.classList.remove("hidden");}}document.querySelectorAll(".card[data-model]").forEach(function(card) {var viewer = card.querySelector("model-viewer");var loader = card.querySelector(".model-loader");if (viewer && loader) setupViewer(viewer, loader);});setupViewer(modalViewer, modalLoader);var lastOpenedModel = "";document.querySelectorAll(".card[data-model]").forEach(function(card) {var btn = card.querySelector(".expand-btn");if (btn) {btn.addEventListener("click", function() {var targetModel = card.dataset.model;var targetPoster = card.dataset.poster || "";modalCaption.textContent = card.dataset.name;modalLoader.classList.remove("hidden");if (targetModel === lastOpenedModel) {var parent = modalViewer.parentNode;var newViewer = document.createElement("model-viewer");newViewer.setAttribute("id", "modalViewer");newViewer.setAttribute("auto-rotate", "");newViewer.setAttribute("camera-controls", "");newViewer.setAttribute("ar", "");newViewer.src = targetModel;newViewer.poster = targetPoster;newViewer.addEventListener("load", function() { modalLoader.classList.add("hidden"); });newViewer.addEventListener("error", function() { modalLoader.classList.add("hidden"); });parent.replaceChild(newViewer, modalViewer);modalViewer = newViewer;} else {modalViewer.src = targetModel;modalViewer.poster = targetPoster;}modal.classList.add("active");lastOpenedModel = targetModel;});}});closeBtn.addEventListener("click", function() {modal.classList.remove("active");modalViewer.src = "";});modal.addEventListener("click", function(e) {if (e.target === modal) {modal.classList.remove("active");modalViewer.src = "";}});document.addEventListener("keydown", function(e) {if (e.key === "Escape" && modal.classList.contains("active")) {modal.classList.remove("active");modalViewer.src = "";}});});
  </script>

  <script>
document.addEventListener("DOMContentLoaded", function() {var videoModal = document.getElementById("videoModal");var videoContainer = document.getElementById("videoContainer");var videoCaption = document.getElementById("videoCaption");var videoCloseBtn = videoModal.querySelector(".modal-close");document.querySelectorAll(".card[data-video]").forEach(function(card) {card.addEventListener("click", function(e) {if (e.target.closest(".expand-btn")) return;e.preventDefault();var videoUrl = card.dataset.video;var name = card.dataset.name;videoCaption.textContent = name;var iframe = document.createElement("iframe");iframe.src = videoUrl + (videoUrl.indexOf("?") > -1 ? "&" : "?") + "autoplay=1";iframe.allow = "autoplay; fullscreen";videoContainer.innerHTML = "";videoContainer.appendChild(iframe);videoModal.classList.add("active");});});videoCloseBtn.addEventListener("click", function() {videoModal.classList.remove("active");videoContainer.innerHTML = "";});videoModal.addEventListener("click", function(e) {if (e.target === videoModal) {videoModal.classList.remove("active");videoContainer.innerHTML = "";}});document.addEventListener("keydown", function(e) {if (e.key === "Escape" && videoModal.classList.contains("active")) {videoModal.classList.remove("active");videoContainer.innerHTML = "";}});});
