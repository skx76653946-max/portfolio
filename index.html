<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>四人 - 3D Artist</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>:root{--bg-primary:#1a1d23;--bg-secondary:#21252d;--bg-card:#262b33;--accent:#c9d1d9;--text-primary:#e6edf3;--text-secondary:#8b949e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,system-ui,sans-serif;background-color:var(--bg-primary);color:var(--text-primary);line-height:1.6}header{text-align:center;padding:4rem 1rem 5rem;position:relative;background:linear-gradient(180deg,#2a2d33 0%,var(--bg-primary) 100%)}header h1{font-size:4rem;font-weight:700;letter-spacing:.12em;color:#fff}.tagline{color:#e8e0d0;font-size:1rem;font-weight:500;letter-spacing:.35em;text-transform:uppercase}main{max-width:1200px;margin:0 auto;padding:2rem 1rem}.section{margin-bottom:4rem}.section h2{font-size:.85rem;font-weight:500;margin-bottom:1.5rem;color:#8b8b8b;text-transform:uppercase;letter-spacing:.25em}.gallery{display:flex;flex-wrap:wrap;justify-content:center;gap:1.5rem}.card{flex:0 1 340px;background-color:var(--bg-card);border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden;aspect-ratio:4/3;position:relative}model-viewer{width:100%;height:100%;background-color:var(--bg-card)}.caption{position:absolute;bottom:0;left:0;right:0;padding:.75rem;background:linear-gradient(transparent,rgba(0,0,0,.8));font-size:.9rem;color:var(--text-secondary)}.expand-btn{position:absolute;top:.75rem;right:.75rem;width:36px;height:36px;border-radius:8px;background:rgba(0,0,0,.6);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;z-index:10}.card:hover .expand-btn{opacity:1}.expand-btn:hover{background:rgba(123,104,238,.8)}.expand-btn svg{width:18px;height:18px;color:#fff}@media(max-width:600px){.gallery{flex-wrap:nowrap;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;justify-content:flex-start;gap:0;padding-bottom:1rem}.gallery::-webkit-scrollbar{display:none}.gallery .card{flex:0 0 85vw;max-width:85vw;scroll-snap-align:center}header h1{font-size:2.5rem}}</style>
</head>
<body>
  <header><h1>四人</h1><p class="tagline">3D Artist</p></header>
  <main>
    <section class="section"><h2>Works</h2><div class="gallery"><div class="card"><model-viewer src="models/whale.glb" alt="Whale" auto-rotate camera-controls ar></model-viewer><button class="expand-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Whale</p></div><div class="card"><model-viewer src="models/gun.glb" alt="Gun" auto-rotate camera-controls ar></model-viewer><button class="expand-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Gun</p></div><div class="card"><model-viewer src="models/lantern.glb" alt="Lantern" auto-rotate camera-controls ar></model-viewer><button class="expand-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Lantern</p></div><div class="card"><model-viewer src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb" alt="Robot" auto-rotate camera-controls ar poster="https://modelviewer.dev/shared-assets/models/RobotExpressive.png"></model-viewer><button class="expand-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Robot</p></div><div class="card"><model-viewer src="https://modelviewer.dev/shared-assets/models/Horse.glb" alt="Horse 2" auto-rotate camera-controls ar poster="https://modelviewer.dev/shared-assets/models/Horse.png"></model-viewer><button class="expand-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Horse 2</p></div></div></section>
  </main>
</body>
</html>
