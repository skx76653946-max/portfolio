<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

<body>
  <header>
    <div class="header-bg"></div>
    <h1>四人</h1>

  <main>
    <section class="section" id="models"><h2>Works</h2><div class="gallery"><div class="card" data-model="models/whale.glb" data-poster="" data-name="Whale"><model-viewer src="models/whale.glb" alt="Whale" auto-rotate camera-controls ar></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Whale</p></div><div class="card" data-model="models/gun.glb" data-poster="" data-name="Gun"><model-viewer src="models/gun.glb" alt="Gun" auto-rotate camera-controls ar></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Gun</p></div><div class="card" data-model="models/lantern.glb" data-poster="" data-name="Lantern"><model-viewer src="models/lantern.glb" alt="Lantern" auto-rotate camera-controls ar></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Lantern</p></div><div class="card" data-model="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb" data-poster="https://modelviewer.dev/shared-assets/models/RobotExpressive.png" data-name="Robot"><model-viewer src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb" alt="Robot" auto-rotate camera-controls ar poster="https://modelviewer.dev/shared-assets/models/RobotExpressive.png"></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Robot</p></div><div class="card" data-model="https://modelviewer.dev/shared-assets/models/Horse.glb" data-poster="https://modelviewer.dev/shared-assets/models/Horse.png" data-name="Horse 2"><model-viewer src="https://modelviewer.dev/shared-assets/models/Horse.glb" alt="Horse 2" auto-rotate camera-controls ar poster="https://modelviewer.dev/shared-assets/models/Horse.png"></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Horse 2</p></div></div><div class="gallery-dots"><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></section>
    <section class="section" id="videos"><h2>Videos</h2><div class="gallery"><div class="card video-card" data-video="https://player.bilibili.com/player.html?bvid=BV1CBQAByEeo" data-name="地编示例-霓虹" data-cover="images/cover_BV1CBQAByEeo.jpg"><div class="video-thumbnail"><img src="images/cover_BV1CBQAByEeo.jpg" alt=""><div class="play-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div></div><p class="caption">地编示例-霓虹</p></div></div><div class="gallery-dots"><span class="dot active"></span></div></section>
    <section class="section" id="ai"><h2>AI Works</h2><div class="gallery"><div class="card"><div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-secondary);font-size:0.9rem;">AI Images</div><p class="caption">AI Images</p></div><div class="card" data-model="" data-name="AI 3D Modeling"><model-viewer src="" alt="AI 3D Modeling" auto-rotate camera-controls ar></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">AI 3D Modeling</p></div><div class="card video-card" data-video="" data-name="AI Video"><div class="video-thumbnail"><div class="play-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div></div><p class="caption">AI Video</p></div></div><div class="gallery-dots"><span class="dot active"></span><span class="dot"></span><span class="dot"></span></div></section>
  </main>
  <footer><p>Contact: 1261182701@qq.com  Wechat: yooodio</p></footer>

  <div class="modal" id="modelModal">
    <div class="modal-content">
      <button class="modal-close" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      <model-viewer id="modalViewer" auto-rotate camera-controls ar></model-viewer>
      <div class="model-loader modal-loader" id="modalLoader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div>
      <p class="modal-caption" id="modalCaption"></p>
    </div>
  </div>

  <div class="modal video-modal" id="videoModal">
    <div class="modal-content">
      <button class="modal-close" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      <div class="video-container" id="videoContainer"></div>
      <p class="modal-caption" id="videoCaption"></p>
    </div>
  </div>

  <script>document.addEventListener("DOMContentLoaded",function(){var m=document.getElementById("modelModal"),v=document.getElementById("modalViewer"),c=document.getElementById("modalCaption"),l=document.getElementById("modalLoader"),closeBtn=document.querySelector(".modal-close");function setupViewer(vw,ld){if(!vw||!ld)return;var pct=ld.querySelector(".loader-text"),hint=ld.querySelector(".loader-hint"),counter=0,timer=null;function startCounter(){clearInterval(timer);counter=0;timer=setInterval(function(){counter++;if(counter>=90&&hint)hint.textContent="Loading slowly...";if(counter>=100){if(pct)pct.textContent="100%";clearInterval(timer);return;}if(pct)pct.textContent=counter+"%";},100);setTimeout(function(){clearInterval(timer);if(counter<100&&hint)hint.textContent="Loading slowly...";},15000);}vw.addEventListener("load",function(){clearInterval(timer);if(counter>100)counter=100;if(pct)pct.textContent="100%";setTimeout(function(){ld.classList.add("hidden");},300);});vw.addEventListener("error",function(){clearInterval(timer);counter=0;if(pct)pct.textContent="Load failed";setTimeout(function(){ld.classList.add("hidden");},2000);});vw.addEventListener("model-visibility",function(e){if(e.detail.visible)startCounter();});if(vw.complete){ld.classList.add("hidden");}else{startCounter();ld.classList.remove("hidden");}}document.querySelectorAll(".card[data-model]").forEach(function(card){var vw=card.querySelector("model-viewer"),ld=card.querySelector(".model-loader");if(vw&&ld)setupViewer(vw,ld);});setupViewer(v,l);var lastModel="";document.querySelectorAll(".card[data-model] .expand-btn").forEach(function(btn){btn.addEventListener("click",function(){var card=btn.closest(".card"),targetModel=card.dataset.model,targetPoster=card.dataset.poster||"";c.textContent=card.dataset.name;if(targetModel===lastModel&&v.src){l.classList.add("hidden");m.classList.add("active");return;}var parent=v.parentNode,newViewer=document.createElement("model-viewer");newViewer.id="modalViewer";newViewer.setAttribute("auto-rotate","");newViewer.setAttribute("camera-controls","");newViewer.setAttribute("ar","");if(targetPoster)newViewer.poster=targetPoster;newViewer.addEventListener("load",function(){l.classList.add("hidden");});newViewer.addEventListener("error",function(){l.classList.add("hidden");});parent.replaceChild(newViewer,v);v=newViewer;l.classList.remove("hidden");v.src=targetModel;v.poster=targetPoster||"";m.classList.add("active");lastModel=targetModel;});});closeBtn.addEventListener("click",function(){m.classList.remove("active");v.src="";lastModel="";});m.addEventListener("click",function(e){if(e.target===m){m.classList.remove("active");v.src="";lastModel="";}});document.addEventListener("keydown",function(e){if(e.key==="Escape"&&m.classList.contains("active")){m.classList.remove("active");v.src="";lastModel="";}});var vModal=document.getElementById("videoModal"),vContainer=document.getElementById("videoContainer"),vCaption=document.getElementById("videoCaption");document.querySelectorAll(".card[data-video]").forEach(function(card){card.addEventListener("click",function(e){if(e.target.closest(".expand-btn"))return;e.preventDefault();var iframe=document.createElement("iframe");iframe.src=card.dataset.video+(card.dataset.video.indexOf("?")>-1?"&":"?")+"autoplay=1";iframe.allow="autoplay;fullscreen";vContainer.innerHTML="";vContainer.appendChild(iframe);vCaption.textContent=card.dataset.name;vModal.classList.add("active");});});vModal.querySelector(".modal-close").addEventListener("click",function(){vModal.classList.remove("active");vContainer.innerHTML="";});vModal.addEventListener("click",function(e){if(e.target===vModal){vModal.classList.remove("active");vContainer.innerHTML="";}});document.addEventListener("keydown",function(e){if(e.key==="Escape"&&vModal.classList.contains("active")){vModal.classList.remove("active");vContainer.innerHTML="";}});});</script>
  <script>(function(){function isMobile(){return window.innerWidth<=600;}function activateViewer(card){var viewer=card.querySelector("model-viewer"),loader=card.querySelector(".model-loader");if(viewer){viewer.classList.add("mobile-active");if(viewer.complete&&loader)loader.classList.add("hidden");}}function deactivateViewer(card){var viewer=card.querySelector("model-viewer");if(viewer)viewer.classList.remove("mobile-active");}function initMobileViewerSwitch(){if(!isMobile())return;document.querySelectorAll(".gallery").forEach(function(gallery){var cards=Array.from(gallery.querySelectorAll(".card[data-model]"));if(!cards.length)return;var section=gallery.closest(".section");var dotsContainer=section?section.querySelector(".gallery-dots"):null;function updateActive(){var scrollLeft=gallery.scrollLeft,center=scrollLeft+gallery.clientWidth/2,bestCard=null,bestDist=Infinity;cards.forEach(function(card){var cLeft=card.offsetLeft,cRight=cLeft+card.offsetWidth,cCenter=(cLeft+cRight)/2,dist=Math.abs(cCenter-center);if(dist<bestDist){bestDist=dist;bestCard=card;}});cards.forEach(function(c){c===bestCard?activateViewer(c):deactivateViewer(c);});if(dotsContainer&&bestCard){var dots=Array.from(dotsContainer.querySelectorAll(".dot"));var activeIdx=cards.indexOf(bestCard);dots.forEach(function(dot,idx){dot.classList.toggle("active",idx===activeIdx);});}}gallery.addEventListener("scroll",updateActive);updateActive();});}function initDotsScroll(){if(!isMobile())return;document.querySelectorAll(".gallery-dots").forEach(function(dotsContainer){var section=dotsContainer.closest(".section");var gallery=section?section.querySelector(".gallery"):null;if(!gallery)return;var cards=Array.from(gallery.querySelectorAll(".card"));function updateDots(){var scrollLeft=gallery.scrollLeft,center=scrollLeft+gallery.clientWidth/2,bestCard=null,bestDist=Infinity;cards.forEach(function(card){var cLeft=card.offsetLeft,cRight=cLeft+card.offsetWidth,cCenter=(cLeft+cRight)/2,dist=Math.abs(cCenter-center);if(dist<bestDist){bestDist=dist;bestCard=card;}});if(bestCard){var dots=Array.from(dotsContainer.querySelectorAll(".dot"));var activeIdx=cards.indexOf(bestCard);dots.forEach(function(dot,idx){dot.classList.toggle("active",idx===activeIdx);});}}gallery.addEventListener("scroll",updateDots);updateDots();});}setTimeout(function(){initMobileViewerSwitch();initDotsScroll();},100);window.addEventListener("resize",function(){initMobileViewerSwitch();initDotsScroll();});})();</script>
</body>
</html>
