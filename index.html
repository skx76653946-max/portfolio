<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>四人 - 3D Artist [TEST2 - auto-rotate only]</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="js/model-viewer.min.js"></script>
  <style>:root{--bg-primary:#1a1d23;--bg-secondary:#21252d;--bg-card:#262b33;--accent:#c9d1d9;--text-primary:#e6edf3;--text-secondary:#8b949e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,system-ui,sans-serif;background-color:var(--bg-primary);color:var(--text-primary);line-height:1.6;position:relative}header{text-align:center;padding:4rem 1rem 5rem;position:relative;z-index:1;background:linear-gradient(180deg,#2a2d33 0%,var(--bg-primary) 100%)}.header-bg{position:absolute;top:0;left:0;right:0;bottom:0;background-color:#e8e4dc;background-image:url("ink-bg.png");background-size:cover;background-position:center 40%;opacity:0.7;z-index:0}.header-gradient{position:absolute;bottom:0;left:0;right:0;height:15px;background:linear-gradient(to bottom,transparent,var(--bg-primary));z-index:4;pointer-events:none}header h1{font-size:4rem;font-weight:700;letter-spacing:.12em;margin-bottom:.5rem;color:#fff;position:relative;z-index:2;text-shadow:3px 3px 12px rgba(0,0,0,.8),0 0 30px rgba(0,0,0,.5)}.tagline{color:#e8e0d0;font-size:1rem;font-weight:500;letter-spacing:.35em;text-transform:uppercase;position:relative;z-index:2;text-shadow:2px 2px 6px rgba(0,0,0,.7)}main{max-width:1200px;margin:0 auto;padding:2rem 1rem;position:relative;z-index:1}.section{margin-bottom:4rem}.section h2{font-size:.85rem;font-weight:500;margin-bottom:1.5rem;color:#8b8b8b;text-transform:uppercase;letter-spacing:.25em}.gallery{display:flex;flex-wrap:wrap;justify-content:center;gap:1.5rem}.card{flex:0 1 340px;background-color:var(--bg-card);border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden;aspect-ratio:4/3;position:relative}model-viewer{width:100%;height:100%;background-color:var(--bg-card)}.video-card{aspect-ratio:16/9}.video-card iframe{width:100%;height:100%;border:none}.caption{position:absolute;bottom:0;left:0;right:0;padding:.75rem;background:linear-gradient(transparent,rgba(0,0,0,.8));font-size:.9rem;color:var(--text-secondary)}footer{text-align:center;padding:3rem 1rem;border-top:1px solid var(--bg-secondary);color:var(--text-secondary);font-size:.9rem;position:relative;z-index:1}@media(max-width:900px){.card{flex:0 1 300px}}@media(max-width:600px){.card{flex:0 1 100%;max-width:400px}header h1{font-size:2.5rem}}.model-loader{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg-card);z-index:5;pointer-events:none;transition:opacity .3s}.model-loader.hidden{opacity:0}.spinner{width:36px;height:36px;border:3px solid rgba(201,209,217,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loader-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.75rem;color:var(--text-secondary);font-weight:500;pointer-events:none}.loader-hint{position:absolute;top:calc(50% + 28px);left:50%;transform:translate(-50%,0);font-size:.65rem;color:var(--text-secondary);opacity:.7;pointer-events:none}@media(max-width:600px){}.video-thumbnail{width:100%;height:100%;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;position:relative}.video-thumbnail img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}.video-thumbnail::before{content:"";position:absolute;inset:0;background:rgba(0,0,0,.3);z-index:1}.play-icon{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;z-index:2}.play-icon svg{width:24px;height:24px;color:#fff}.video-modal .video-container{width:100%;max-width:900px;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden}.video-modal .video-container iframe{width:100%;height:100%;border:none}</style>
</head>
<body>
  <header>
    <div class="header-bg"></div>
    <h1>四人</h1>
    <p class="tagline">3D Artist</p>
    <div class="header-gradient"></div>
  </header>
  <main>
    <section class="section" id="models"><h2>Works</h2><div class="gallery"><div class="card" data-model="models/whale.glb" data-poster="" data-name="Whale"><model-viewer src="models/whale.glb" alt="Whale" auto-rotate></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><p class="caption">Whale</p></div><div class="card" data-model="models/gun.glb" data-poster="" data-name="Gun"><model-viewer src="models/gun.glb" alt="Gun" auto-rotate></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><p class="caption">Gun</p></div><div class="card" data-model="models/lantern.glb" data-poster="" data-name="Lantern"><model-viewer src="models/lantern.glb" alt="Lantern" auto-rotate></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><p class="caption">Lantern</p></div><div class="card" data-model="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb" data-poster="https://modelviewer.dev/shared-assets/models/RobotExpressive.png" data-name="Robot"><model-viewer src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb" alt="Robot" auto-rotate poster="https://modelviewer.dev/shared-assets/models/RobotExpressive.png"></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><p class="caption">Robot</p></div><div class="card" data-model="https://modelviewer.dev/shared-assets/models/Horse.glb" data-poster="https://modelviewer.dev/shared-assets/models/Horse.png" data-name="Horse 2"><model-viewer src="https://modelviewer.dev/shared-assets/models/Horse.glb" alt="Horse 2" auto-rotate poster="https://modelviewer.dev/shared-assets/models/Horse.png"></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><p class="caption">Horse 2</p></div></div></section>
    <section class="section" id="videos"><h2>Videos</h2><div class="gallery"><div class="card video-card" data-video="https://player.bilibili.com/player.html?bvid=BV1CBQAByEeo" data-name="地编示例-霓虹" data-cover="images/cover_BV1CBQAByEeo.jpg"><div class="video-thumbnail"><img src="images/cover_BV1CBQAByEeo.jpg" alt="" onerror="this.style.display='none'"><div class="play-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div></div><p class="caption">地编示例-霓虹</p></div></div></section>
    <section class="section" id="ai"><h2>AI Works</h2><div class="gallery"><div class="card"><img src="" alt="AI Images" style="width:100%;height:100%;object-fit:cover;"><p class="caption">AI Images</p></div><div class="card" data-model="" data-name="AI 3D Modeling"><model-viewer src="" alt="AI 3D Modeling" auto-rotate></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><p class="caption">AI 3D Modeling</p></div><div class="card video-card" data-video="" data-name="AI Video"><div class="video-thumbnail"><div class="play-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div></div><p class="caption">AI Video</p></div></div></section>
  </main>
  <footer><p>Contact: 1261182701@qq.com  Wechat: yooodio</p></footer>
</body>
</html>
