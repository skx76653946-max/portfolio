tps://modelviewer.dev/shared-assets/models/RobotExpressive.glb" data-poster="https://modelviewer.dev/shared-assets/models/RobotExpressive.png" data-name="Robot"><model-viewer src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb" alt="Robot" auto-rotate camera-controls ar poster="https://modelviewer.dev/shared-assets/models/RobotExpressive.png"></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Robot</p></div><div class="card" data-model="https://modelviewer.dev/shared-assets/models/Horse.glb" data-poster="https://modelviewer.dev/shared-assets/models/Horse.png" data-name="Horse 2"><model-viewer src="https://modelviewer.dev/shared-assets/models/Horse.glb" alt="Horse 2" auto-rotate camera-controls ar poster="https://modelviewer.dev/shared-assets/models/Horse.png"></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Horse 2</p></div></div>

      <div class="gallery"><div class="card"><img src="" alt="AI Images" style="width:100%;height:100%;object-fit:cover;"><p class="caption">AI Images</p></div><div class="card" data-model="" data-name="AI 3D Modeling"><model-viewer src="" alt="AI 3D Modeling" auto-rotate camera-controls ar></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">AI 3D Modeling</p></div><div class="card video-card"><iframe src="" title="AI Video" frameborder="0" allowfullscreen></iframe><p class="caption">AI Video</p></div></div>

  <footer>

  <div class="modal" id="modelModal">
    <div class="modal-content">
      <button class="modal-close" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      <model-viewer id="modalViewer" auto-rotate camera-controls ar></model-viewer>
      <div class="model-loader modal-loader" id="modalLoader"><div class="spinner"></div></div>
      <p class="modal-caption" id="modalCaption"></p>
    </div>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      var modal = document.getElementById("modelModal");
      var modalViewer = document.getElementById("modalViewer");
      var modalCaption = document.getElementById("modalCaption");
      var modalLoader = document.getElementById("modalLoader");
      var closeBtn = document.querySelector(".modal-close");

      function setupViewer(viewer, loader) {
        if (!viewer || !loader) return;
        var pctEl = loader.querySelector(".loader-text");
        var counter = 0;
        var maxCount = 90;
        var stepMs = 100;
        var timer = null;
        var started = false;
        function startCounter() {
          if (started) return;
          started = true;
          timer = setInterval(function() {
            counter++;
            if (counter >= maxCount) {
              clearInterval(timer);
              var hint = loader.querySelector(".loader-hint"); if (hint) hint.textContent = "加载较慢...";
            } else {
              if (pctEl) pctEl.textContent = counter + "%";
            }
          }, stepMs);
          setTimeout(function() {
            if (!started || counter < 100) {
              clearInterval(timer);
              var hint = loader.querySelector(".loader-hint"); if (hint) hint.textContent = "加载较慢...";
            }
          }, 15000);
        }
        viewer.addEventListener("load", function() {
          clearInterval(timer);
          counter = 100;
          if (pctEl) pctEl.textContent = "100%";
          setTimeout(function() { loader.classList.add("hidden"); }, 300);
        });
        viewer.addEventListener("error", function() {
          clearInterval(timer);
          if (pctEl) pctEl.textContent = "加载失败";
          setTimeout(function() { loader.classList.add("hidden"); }, 2000);
        });
        viewer.addEventListener("model-visibility", function(e) {
          if (e.detail.visible && !started) startCounter();
        });
        if (viewer.src && viewer.loaded) { loader.classList.add("hidden"); } else {
          startCounter();
          loader.classList.remove("hidden");
        }
      }

      document.querySelectorAll(".card[data-model]").forEach(function(card) {
        var viewer = card.querySelector("model-viewer");
        var loader = card.querySelector(".model-loader");
        if (viewer && loader) setupViewer(viewer, loader);
      });

      setupViewer(modalViewer, modalLoader);

      var lastOpenedModel = "";
      document.querySelectorAll(".card[data-model]").forEach(function(card) {
        var btn = card.querySelector(".expand-btn");
        if (btn) {
          btn.addEventListener("click", function() {
            var targetModel = card.dataset.model;
            var targetPoster = card.dataset.poster || "";
            modalCaption.textContent = card.dataset.name;
            modal.classList.add("active");
            modalLoader.classList.remove("hidden");

            if (targetModel === lastOpenedModel) {
              var parent = modalViewer.parentNode;
              var newViewer = document.createElement("model-viewer");
              newViewer.setAttribute("id", "modalViewer");
              newViewer.setAttribute("auto-rotate", "");
              newViewer.setAttribute("camera-controls", "");
              newViewer.setAttribute("ar", "");
              newViewer.src = targetModel;
              newViewer.poster = targetPoster;
              newViewer.addEventListener("load", function() { modalLoader.classList.add("hidden"); });
              newViewer.addEventListener("error", function() { modalLoader.classList.add("hidden"); });
              parent.replaceChild(newViewer, modalViewer);
              modalViewer = newViewer;
            } else {
              modalViewer.src = targetModel;
              modalViewer.poster = targetPoster;
            }
            lastOpenedModel = targetModel;
          });
        }
      });
      closeBtn.addEventListener("click", function() {
        modal.classList.remove("active");
        modalViewer.src = "";
      });
      modal.addEventListener("click", function(e) {
        if (e.target === modal) {
          modal.classList.remove("active");
          modalViewer.src = "";
        }
      });
      document.addEventListener("keydown", function(e) {
        if (e.key === "Escape" && modal.classList.contains("active")) {
          modal.classList.remove("active");
          modalViewer.src = "";
        }
      });
    });
  </script>
</body>
