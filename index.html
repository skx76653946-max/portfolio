<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>四人 - 3D Artist</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="js/model-viewer.min.js"></script>
  <style>:root{--bg-primary:#1a1d23;--bg-secondary:#21252d;--bg-card:#262b33;--accent:#c9d1d9;--text-primary:#e6edf3;--text-secondary:#8b949e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,system-ui,sans-serif;background-color:var(--bg-primary);color:var(--text-primary);line-height:1.6;position:relative}body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)"/%3E%3C/svg%3E");background-repeat:repeat;background-size:200px 200px}header{text-align:center;padding:4rem 1rem 5rem;position:relative;z-index:1;background:linear-gradient(180deg,#2a2d33 0%,var(--bg-primary) 100%)}.header-bg{position:absolute;top:0;left:0;right:0;bottom:0;background-color:#e8e4dc;background-image:url("ink-bg.png");background-size:cover;background-position:center 40%;opacity:0.7;z-index:0}.header-gradient{position:absolute;bottom:0;left:0;right:0;height:15px;background:linear-gradient(to bottom,transparent,var(--bg-primary));z-index:4;pointer-events:none}header h1{font-size:4rem;font-weight:700;letter-spacing:.12em;margin-bottom:.5rem;color:#fff;position:relative;z-index:2;text-shadow:3px 3px 12px rgba(0,0,0,.8),0 0 30px rgba(0,0,0,.5)}.tagline{color:#e8e0d0;font-size:1rem;font-weight:500;letter-spacing:.35em;text-transform:uppercase;position:relative;z-index:2;text-shadow:2px 2px 6px rgba(0,0,0,.7)}main{max-width:1200px;margin:0 auto;padding:2rem 1rem;position:relative;z-index:1}.section{margin-bottom:4rem}.section h2{font-size:.85rem;font-weight:500;margin-bottom:1.5rem;color:#8b8b8b;text-transform:uppercase;letter-spacing:.25em}.gallery{display:flex;flex-wrap:wrap;justify-content:center;gap:1.5rem}.card{flex:0 1 340px;background-color:var(--bg-card);border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden;aspect-ratio:4/3;position:relative}model-viewer{width:100%;height:100%;background-color:var(--bg-card)}.video-card{aspect-ratio:16/9}.video-card iframe{width:100%;height:100%;border:none}.caption{position:absolute;bottom:0;left:0;right:0;padding:.75rem;background:linear-gradient(transparent,rgba(0,0,0,.8));font-size:.9rem;color:var(--text-secondary)}footer{text-align:center;padding:3rem 1rem;border-top:1px solid var(--bg-secondary);color:var(--text-secondary);font-size:.9rem;position:relative;z-index:1}@media(max-width:900px){.card{flex:0 1 300px}}@media(max-width:600px){.card{flex:0 1 100%;max-width:400px}header h1{font-size:2.5rem}}model-viewer::part(default-ar-button){background-color:var(--accent)}.expand-btn{position:absolute;top:.75rem;right:.75rem;width:36px;height:36px;border-radius:8px;background:rgba(0,0,0,.6);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s,background .2s;z-index:10}.expand-btn svg{width:18px;height:18px;color:#fff}.card:hover .expand-btn{opacity:1}.expand-btn:hover{background:rgba(123,104,238,.8)}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:1000;align-items:center;justify-content:center;padding:2rem}.modal.active{display:flex}.modal-content{position:relative;width:100%;max-width:1000px;max-height:90vh;display:flex;flex-direction:column;align-items:center}.modal-close{position:absolute;top:-3rem;right:0;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:10}.modal-close svg{width:24px;height:24px;color:#fff}.modal-close:hover{background:rgba(255,255,255,.2)}#modalViewer{width:100%;height:70vh;background:var(--bg-card);border-radius:12px}.model-loader{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg-card);z-index:5;pointer-events:none;transition:opacity .3s}.model-loader.hidden{opacity:0}.spinner{width:36px;height:36px;border:3px solid rgba(201,209,217,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loader-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.75rem;color:var(--text-secondary);font-weight:500;pointer-events:none}.loader-hint{position:absolute;top:calc(50% + 28px);left:50%;transform:translate(-50%,0);font-size:.65rem;color:var(--text-secondary);opacity:.7;pointer-events:none}.modal-loader{border-radius:12px}.modal-caption{margin-top:1rem;font-size:1.1rem;color:var(--text-secondary)}@media(max-width:600px){.modal{padding:1rem}#modalViewer{height:50vh}.modal-close{top:-3.5rem}}.video-thumbnail{width:100%;height:100%;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;position:relative}.video-thumbnail img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}.video-thumbnail::before{content:"";position:absolute;inset:0;background:rgba(0,0,0,.3);z-index:1}.play-icon{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;z-index:2}.play-icon svg{width:24px;height:24px;color:#fff}.video-modal .video-container{width:100%;max-width:900px;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden}.video-modal .video-container iframe{width:100%;height:100%;border:none}</style>
</head>
<body>
  <header>
    <div class="header-bg"></div>
    <h1>四人</h1>

  <main>
    <section class="section" id="models"><h2>Works</h2><div class="gallery"><div class="card" data-model="models/whale.glb" data-poster="" data-name="Whale"><model-viewer src="models/whale.glb" alt="Whale" auto-rotate camera-controls ar></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Whale</p></div><div class="card" data-model="models/gun.glb" data-poster="" data-name="Gun"><model-viewer src="models/gun.glb" alt="Gun" auto-rotate camera-controls ar></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Gun</p></div><div class="card" data-model="models/lantern.glb" data-poster="" data-name="Lantern"><model-viewer src="models/lantern.glb" alt="Lantern" auto-rotate camera-controls ar></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Lantern</p></div><div class="card" data-model="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb" data-poster="https://modelviewer.dev/shared-assets/models/RobotExpressive.png" data-name="Robot"><model-viewer src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb" alt="Robot" auto-rotate camera-controls ar poster="https://modelviewer.dev/shared-assets/models/RobotExpressive.png"></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Robot</p></div><div class="card" data-model="https://modelviewer.dev/shared-assets/models/Horse.glb" data-poster="https://modelviewer.dev/shared-assets/models/Horse.png" data-name="Horse 2"><model-viewer src="https://modelviewer.dev/shared-assets/models/Horse.glb" alt="Horse 2" auto-rotate camera-controls ar poster="https://modelviewer.dev/shared-assets/models/Horse.png"></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">Horse 2</p></div></div></section>
    <section class="section" id="videos"><h2>Videos</h2><div class="gallery"><div class="card video-card" data-video="https://player.bilibili.com/player.html?bvid=BV1CBQAByEeo" data-name="地编示例-霓虹" data-cover="images/cover_BV1CBQAByEeo.jpg"><div class="video-thumbnail"><img src="images/cover_BV1CBQAByEeo.jpg" alt=""><div class="play-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div></div><p class="caption">地编示例-霓虹</p></div><div class="card video-card" data-video="https://player.bilibili.com/player.html?bvid=" data-name="新视频" data-cover=""><div class="video-thumbnail"><div class="play-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div></div><p class="caption">新视频</p></div><div class="card video-card" data-video="https://player.bilibili.com/player.html?bvid=" data-name="新视频" data-cover=""><div class="video-thumbnail"><div class="play-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div></div><p class="caption">新视频</p></div></div></section>
    <section class="section" id="ai"><h2>AI Works</h2><div class="gallery"><div class="card"><img src="" alt="AI Images" style="width:100%;height:100%;object-fit:cover;"><p class="caption">AI Images</p></div><div class="card" data-model="" data-name="AI 3D Modeling"><model-viewer src="" alt="AI 3D Modeling" auto-rotate camera-controls ar></model-viewer><div class="model-loader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div><button class="expand-btn" aria-label="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button><p class="caption">AI 3D Modeling</p></div><div class="card video-card" data-video="" data-name="AI Video"><div class="video-thumbnail"><div class="play-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div></div><p class="caption">AI Video</p></div></div></section>
  </main>
  <footer><p>Contact: 1261182701@qq.com  Wechat: yooodio</p></footer>
  <div class="modal" id="modelModal">
    <div class="modal-content">
      <button class="modal-close" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      <model-viewer id="modalViewer" auto-rotate camera-controls ar></model-viewer>
      <div class="model-loader modal-loader" id="modalLoader"><div class="spinner"></div><div class="loader-text">0%</div><div class="loader-hint"></div></div>
      <p class="modal-caption" id="modalCaption"></p>
    </div>
  </div>
  <div class="modal video-modal" id="videoModal">
    <div class="modal-content">
      <button class="modal-close" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      <div class="video-container" id="videoContainer"></div>
      <p class="modal-caption" id="videoCaption"></p>
    </div>
  </div>
  <script>
document.addEventListener("DOMContentLoaded", function() {var modal = document.getElementById("modelModal");var modalViewer = document.getElementById("modalViewer");var modalCaption = document.getElementById("modalCaption");var modalLoader = document.getElementById("modalLoader");var closeBtn = document.querySelector(".modal-close");function setupViewer(viewer, loader) {if (!viewer || !loader) return;var pctEl = loader.querySelector(".loader-text");var hintEl = loader.querySelector(".loader-hint");var counter = 0;var started = false;var timer = null;function startCounter() {if (started) return;started = true;timer = setInterval(function() {counter++;if (counter >= 90) {clearInterval(timer);if (hintEl) hintEl.textContent = "加载较慢...";} else {if (pctEl) pctEl.textContent = counter + "%";}}, 100);setTimeout(function() {if (counter < 100) {clearInterval(timer);if (hintEl) hintEl.textContent = "加载较慢...";}}, 15000);}viewer.addEventListener("load", function() {clearInterval(timer);counter = 100;if (pctEl) pctEl.textContent = "100%";setTimeout(function() { loader.classList.add("hidden"); }, 300);});viewer.addEventListener("error", function() {clearInterval(timer);if (pctEl) pctEl.textContent = "加载失败";setTimeout(function() { loader.classList.add("hidden"); }, 2000);});viewer.addEventListener("model-visibility", function(e) {if (e.detail.visible && !started) startCounter();});if (viewer.src && viewer.loaded) {loader.classList.add("hidden");} else {startCounter();loader.classList.remove("hidden");}}document.querySelectorAll(".card[data-model]").forEach(function(card) {var viewer = card.querySelector("model-viewer");var loader = card.querySelector(".model-loader");if (viewer && loader) setupViewer(viewer, loader);});setupViewer(modalViewer, modalLoader);var lastOpenedModel = "";document.querySelectorAll(".card[data-model]").forEach(function(card) {var btn = card.querySelector(".expand-btn");if (btn) {btn.addEventListener("click", function() {var targetModel = card.dataset.model;var targetPoster = card.dataset.poster || "";modalCaption.textContent = card.dataset.name;modalLoader.classList.remove("hidden");if (targetModel === lastOpenedModel) {var parent = modalViewer.parentNode;var newViewer = document.createElement("model-viewer");newViewer.setAttribute("id", "modalViewer");newViewer.setAttribute("auto-rotate", "");newViewer.setAttribute("camera-controls", "");newViewer.setAttribute("ar", "");newViewer.src = targetModel;newViewer.poster = targetPoster;newViewer.addEventListener("load", function() { modalLoader.classList.add("hidden"); });newViewer.addEventListener("error", function() { modalLoader.classList.add("hidden"); });parent.replaceChild(newViewer, modalViewer);modalViewer = newViewer;} else {modalViewer.src = targetModel;modalViewer.poster = targetPoster;}modal.classList.add("active");lastOpenedModel = targetModel;});}});closeBtn.addEventListener("click", function() {modal.classList.remove("active");modalViewer.src = "";});modal.addEventListener("click", function(e) {if (e.target === modal) {modal.classList.remove("active");modalViewer.src = "";}});document.addEventListener("keydown", function(e) {if (e.key === "Escape" && modal.classList.contains("active")) {modal.classList.remove("active");modalViewer.src = "";}});});
  </script>
  <script>
document.addEventListener("DOMContentLoaded", function() {var videoModal = document.getElementById("videoModal");var videoContainer = document.getElementById("videoContainer");var videoCaption = document.getElementById("videoCaption");var videoCloseBtn = videoModal.querySelector(".modal-close");document.querySelectorAll(".card[data-video]").forEach(function(card) {card.addEventListener("click", function(e) {if (e.target.closest(".expand-btn")) return;e.preventDefault();var videoUrl = card.dataset.video;var name = card.dataset.name;videoCaption.textContent = name;var iframe = document.createElement("iframe");iframe.src = videoUrl + (videoUrl.indexOf("?") > -1 ? "&" : "?") + "autoplay=1";iframe.allow = "autoplay; fullscreen";videoContainer.innerHTML = "";videoContainer.appendChild(iframe);videoModal.classList.add("active");});});videoCloseBtn.addEventListener("click", function() {videoModal.classList.remove("active");videoContainer.innerHTML = "";});videoModal.addEventListener("click", function(e) {if (e.target === videoModal) {videoModal.classList.remove("active");videoContainer.innerHTML = "";}});document.addEventListener("keydown", function(e) {if (e.key === "Escape" && videoModal.classList.contains("active")) {videoModal.classList.remove("active");videoContainer.innerHTML = "";}});});
  </script>
</body>
</html>
